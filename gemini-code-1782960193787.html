<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Fruit Cut Master</title>
    
    <meta name="theme-color" content="#121212">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Fruit Cut Master">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    
    <link rel="preconnect" href="https://api.crazygames.com">

    <link rel="stylesheet" href="style.css">

    <link rel="preload" as="image" href="assets/bg/golden.jpeg">
    <link rel="preload" as="image" href="assets/bg/minimal.jpeg">

    <link rel="preload" as="image" href="assets/fruites/apple.png">
    <link rel="preload" as="image" href="assets/fruites/banana.png">
    <link rel="preload" as="image" href="assets/fruites/grapes.png">
    <link rel="preload" as="image" href="assets/fruites/black_grapes.png">
    <link rel="preload" as="image" href="assets/fruites/green01.png">
    <link rel="preload" as="image" href="assets/fruites/jackfruite.png">
    <link rel="preload" as="image" href="assets/fruites/kiwi.png">
    <link rel="preload" as="image" href="assets/fruites/lemon.png">
    <link rel="preload" as="image" href="assets/fruites/muskmelon.png">
    <link rel="preload" as="image" href="assets/fruites/tomato.png">

    <link rel="preload" as="image" href="assets/special/apple.png">
    <link rel="preload" as="image" href="assets/special/banana.png">
    <link rel="preload" as="image" href="assets/special/coconut.png">
    <link rel="preload" as="image" href="assets/special/kiwi.png">
    <link rel="preload" as="image" href="assets/special/pear.png">
    <link rel="preload" as="image" href="assets/special/potato.png">
    <link rel="preload" as="image" href="assets/special/watermelon.png">

    <link rel="preload" as="image" href="assets/sword/clasic.png">
    <link rel="preload" as="image" href="assets/sword/fire.png">

    <link rel="preload" as="image" href="assets/sword/rainbow.png">
    <link rel="preload" as="image" href="assets/sword/shadow.png">

    <link rel="preload" as="image" href="assets/splash/fire.png">
    <link rel="preload" as="image" href="assets/splash/electric.png">
    <link rel="preload" as="image" href="assets/splash/golden.png">
    <link rel="preload" as="image" href="assets/splash/ice.png">
    <link rel="preload" as="image" href="assets/splash/rainbow.png">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
        }
        img {
            -webkit-user-drag: none;
            user-drag: none;
        }
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <canvas id="game-canvas" width="100" height="100" oncontextmenu="return false;"></canvas>

    <div id="particle-layer" class="ui-layer"></div>
    <div id="effects-layer" class="ui-layer"></div>
    <div id="coin-animation-container" class="ui-layer"></div>

    <section id="loading-screen" class="screen-overlay">
        <div class="loading-wrapper">
            <div id="logo-container">
                <h1 class="game-logo">FRUIT CUT<br><span>MASTER</span></h1>
            </div>
            <div class="progress-container">
                <div id="progress-bar" style="width: 0%;"></div>
            </div>
            <div class="loading-stats">
                <span id="loading-percentage">0%</span>
                <span id="asset-count">0 / 35 Loaded</span>
            </div>
        </div>
    </section>

    <section id="main-menu" class="screen-overlay hidden">
        <div class="menu-wrapper">
            <h1 class="menu-title">FRUIT CUT MASTER</h1>
            <div class="menu-buttons">
                <button id="btn-start" class="btn btn-primary">PLAY GAME</button>
                <button id="btn-shop" class="btn btn-secondary">SHOP</button>
                <button id="btn-achievements" class="btn btn-secondary">ACHIEVEMENTS</button>
                <button id="btn-settings" class="btn btn-icon">SETTINGS</button>
            </div>
        </div>
    </section>

    <section id="gameplay-hud" class="ui-layer hidden">
        <div class="hud-top-left">
            <div class="hud-stat score-container">SCORE: <span id="hud-score">0</span></div>
            <div id="combo-container" class="combo-pop hidden">COMBO x<span id="hud-combo">0</span></div>
        </div>
        <div class="hud-top-right">
            <div class="hud-stat coin-counter">COINS: <span id="hud-coins">0</span></div>
            <div id="lives-container" class="lives-display">
                <div class="life-heart active" data-life="1"></div>
                <div class="life-heart active" data-life="2"></div>
                <div class="life-heart active" data-life="3"></div>
            </div>
            <button id="btn-pause" class="btn-pause-hud">||</button>
        </div>
    </section>

    <div id="modal-shop" class="modal-overlay hidden">
        <div class="modal-content">
            <button id="btn-close-shop" class="btn-close">&times;</button>
            <h2>DOJO SHOP</h2>
            <div class="shop-tabs">
                <button class="tab-btn active" data-tab="swords">SWORDS</button>
                <button class="tab-btn" data-tab="backgrounds">BACKGROUNDS</button>
            </div>
            <div class="shop-grid" id="shop-items-container">
                </div>
        </div>
    </div>

    <div id="modal-achievements" class="modal-overlay hidden">
        <div class="modal-content">
            <button id="btn-close-achievements" class="btn-close">&times;</button>
            <h2>ACHIEVEMENTS</h2>
            <div class="achievements-list" id="achievements-container">
                </div>
        </div>
    </div>

    <div id="modal-settings" class="modal-overlay hidden">
        <div class="modal-content text-center">
            <button id="btn-close-settings" class="btn-close">&times;</button>
            <h2>SETTINGS</h2>
            <div class="settings-options">
                <div class="setting-row">
                    <label for="setting-sound">SOUND FX</label>
                    <input type="checkbox" id="setting-sound" checked>
                </div>
                <div class="setting-row">
                    <label for="setting-music">MUSIC</label>
                    <input type="checkbox" id="setting-music" checked>
                </div>
                <div class="setting-row">
                    <label for="setting-vibration">VIBRATION</label>
                    <input type="checkbox" id="setting-vibration" checked>
                </div>
            </div>
        </div>
    </div>

    <section id="pause-menu" class="screen-overlay hidden">
        <div class="menu-wrapper card-layout">
            <h2>GAME PAUSED</h2>
            <div class="menu-buttons vertical">
                <button id="btn-resume" class="btn btn-primary">RESUME</button>
                <button id="btn-restart-pause" class="btn btn-secondary">RESTART</button>
                <button id="btn-quit-pause" class="btn btn-danger">QUIT TO MENU</button>
            </div>
        </div>
    </section>

    <section id="game-over-menu" class="screen-overlay hidden">
        <div class="menu-wrapper card-layout">
            <h1 class="game-over-title">GAME OVER</h1>
            <div class="game-over-stats">
                <p>FINAL SCORE: <span id="final-score">0</span></p>
                <p>BEST SCORE: <span id="best-score">0</span></p>
                <p>COINS EARNED: <span id="earned-coins">0</span></p>
            </div>
            <div class="menu-buttons vertical">
                <button id="btn-retry" class="btn btn-primary">PLAY AGAIN</button>
                <button id="btn-quit-gameover" class="btn btn-secondary">MAIN MENU</button>
            </div>
        </div>
    </section>

    <div id="notification-container" class="toast-layer"></div>
    <div id="achievement-popup-container" class="toast-layer"></div>
    <div id="level-up-popup-container" class="toast-layer"></div>

    <script src="https://api.crazygames.com/v2/crazygames-sdk.js"></script>

    <script src="game.js" defer></script>
</body>
</html>
